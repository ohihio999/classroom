<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登記掛號信</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .header { background: #1976D2; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .back-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .content { padding: 16px; max-width: 600px; margin: 0 auto; }
    .section { background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .section h2 { font-size: 14px; color: #555; margin-bottom: 14px; font-weight: 600; }
    /* 正面/反面 並排 */
    .photo-pair { display: flex; gap: 10px; margin-bottom: 12px; }
    .photo-slot { flex: 1; }
    .photo-slot-label { font-size: 12px; color: #888; text-align: center; margin-bottom: 6px; font-weight: 600; }
    .photo-placeholder { border: 2px dashed #ddd; border-radius: 10px; padding: 18px 8px; text-align: center; margin-bottom: 6px; }
    .photo-placeholder .ph-icon { font-size: 26px; }
    .photo-placeholder .ph-text { font-size: 11px; color: #bbb; margin-top: 3px; }
    .photo-preview { width: 100%; max-height: 130px; object-fit: contain; border-radius: 8px; display: none; margin-bottom: 6px; border: 1px solid #eee; }
    input[type="file"] { display: none; }
    .photo-btns { display: flex; gap: 5px; }
    .btn-cam { flex: 1; padding: 8px 4px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 3px; background: #1976D2; color: white; }
    .btn-gal { flex: 1; padding: 8px 4px; border-radius: 7px; border: 1px solid #1976D2; cursor: pointer; font-size: 12px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 3px; background: white; color: #1976D2; }
    /* OCR 按鈕 */
    .btn-ocr { width: 100%; padding: 13px; border-radius: 10px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; background: #388E3C; color: white; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-ocr:disabled { background: #bbb; cursor: not-allowed; }
    .ocr-status { margin-top: 10px; font-size: 13px; color: #888; min-height: 18px; text-align: center; }
    .ocr-status.success { color: #388E3C; }
    .ocr-status.error { color: #d32f2f; }
    /* 收件人候選選單 */
    .recipient-picker { display: none; margin-top: 6px; background: #fff; border: 1px solid #1976D2; border-radius: 8px; padding: 8px; }
    .recipient-picker-label { font-size: 11px; color: #888; margin-bottom: 6px; }
    .recipient-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .recipient-chip { padding: 6px 12px; border-radius: 20px; background: #E3F2FD; color: #1565C0; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
    .recipient-chip:active { background: #1976D2; color: white; }
    /* 表單 */
    .form-group { margin-bottom: 13px; }
    .form-group label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: #1976D2; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    /* 儲存按鈕 */
    .save-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn-save { padding: 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; color: white; display: flex; align-items: center; justify-content: center; }
    .btn-save:disabled { background: #aaa; cursor: not-allowed; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h1>登記掛號信</h1>
  <button class="back-btn" onclick="location.href='/'" style="margin-left:auto">🏠</button>
</div>

<div class="content">

  <!-- 拍照區 -->
  <div class="section">
    <h2>📷 拍攝信封</h2>
    <div class="photo-pair">

      <!-- 正面 -->
      <div class="photo-slot">
        <div class="photo-slot-label">正面</div>
        <img id="frontPreview" class="photo-preview" alt="">
        <div id="frontPlaceholder" class="photo-placeholder">
          <div class="ph-icon">✉️</div>
          <div class="ph-text">信封正面</div>
        </div>
        <div class="photo-btns">
          <label class="btn-cam" for="frontCamera">📷</label>
          <label class="btn-gal" for="frontGallery">🖼️</label>
        </div>
        <input type="file" id="frontCamera" accept="image/*" capture="environment">
        <input type="file" id="frontGallery" accept="image/*">
      </div>

      <!-- 反面 -->
      <div class="photo-slot">
        <div class="photo-slot-label">反面</div>
        <img id="backPreview" class="photo-preview" alt="">
        <div id="backPlaceholder" class="photo-placeholder">
          <div class="ph-icon">📋</div>
          <div class="ph-text">信封反面</div>
        </div>
        <div class="photo-btns">
          <label class="btn-cam" for="backCamera">📷</label>
          <label class="btn-gal" for="backGallery">🖼️</label>
        </div>
        <input type="file" id="backCamera" accept="image/*" capture="environment">
        <input type="file" id="backGallery" accept="image/*">
      </div>

    </div>

    <button class="btn-ocr" id="ocrBtn" onclick="runOCR()" disabled>✨ 自動辨識</button>
    <div class="ocr-status" id="ocrStatus"></div>
  </div>

  <!-- 信件資訊 -->
  <div class="section">
    <h2>📝 信件資訊</h2>
    <div class="form-group">
      <label>掛號號碼</label>
      <input type="text" id="trackingNumber" placeholder="" style="font-family:'Courier New',monospace;letter-spacing:1px">
    </div>
    <div class="form-group">
      <label>收件人</label>
      <input type="text" id="recipient" placeholder="姓名或單位">
      <div class="recipient-picker" id="recipientPicker">
        <div class="recipient-picker-label">請點選收件人：</div>
        <div class="recipient-chips" id="recipientChips"></div>
      </div>
    </div>
    <div class="form-group">
      <label>寄件人</label>
      <input type="text" id="sender" placeholder="姓名或單位">
      <div id="senderLookupStatus" style="font-size:12px;color:#388E3C;margin-top:4px;min-height:16px;"></div>
    </div>
    <div class="form-group">
      <label>寄件人地址</label>
      <input type="text" id="senderAddress" placeholder="自動帶入或手動填寫">
    </div>
    <div class="form-group">
      <label>寄件人電話</label>
      <input type="text" id="senderPhone" placeholder="自動帶入或手動填寫">
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="date">
    </div>
    <div class="form-group">
      <label>備註</label>
      <textarea id="notes" placeholder="選填"></textarea>
    </div>
  </div>

  <div class="save-row">
    <button class="btn-save" id="continueBtn" onclick="saveAndContinue()" style="background:#388E3C;flex:1">儲存並繼續</button>
    <button class="btn-save" id="saveBtn" onclick="saveRecord()" style="background:#1976D2;padding:16px 24px">儲存完成</button>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc, getDocs, query, where, limit } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-functions.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

const firebaseConfig = { apiKey:"AIzaSyBf0sHTsndFCksNlh46G_2mw9rk5zmPdc0", authDomain:"my-teaching-tools-2b36c.firebaseapp.com", projectId:"my-teaching-tools-2b36c", storageBucket:"my-teaching-tools-2b36c.firebasestorage.app", messagingSenderId:"82693897353", appId:"1:82693897353:web:f667501aad05c536c09a58" };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const functions = getFunctions(app, 'asia-east1');
const auth = getAuth(app);
const ocrEnvelope = httpsCallable(functions, 'ocrEnvelope');

onAuthStateChanged(auth, user => { if (!user) location.href = '/login.html'; });

// ── 公司收件人名單 ──────────────────────────────────
const RECIPIENTS = [
  { zh: '林玉鈴', en: 'Kanny' },
  { zh: '黃志堅', en: 'Charles' },
  { zh: '林毓婷', en: 'Cherrie' },
  { zh: '黃義正', en: 'Jacky' },
  { zh: '吳翊平', en: 'Yibi' },
  { zh: '曾書彥', en: 'Norika' },
  { zh: '王儷蓉', en: 'Lisa' },
  { zh: '許世佑', en: 'Seal' },
  { zh: '陳佳興', en: 'Steven' },
  { zh: '陳姵存', en: 'Kelly' },
  { zh: '林宥燁', en: 'Yedda' },
  { zh: '林逸昇', en: 'Eason' },
  { zh: '蘇彥霖', en: 'Russell' },
  { zh: '鍾文綺', en: 'Hina' },
  { zh: '石博仁', en: 'Seki' },
  { zh: '潘怡穎', en: 'Daisy' },
];

function formatPerson(p) { return `${p.zh} (${p.en})`; }

function matchRecipient(text) {
  if (!text) return [];
  const t = text.trim();
  const tLower = t.toLowerCase();

  // 精確比對：全名（中或英）
  const exact = RECIPIENTS.filter(p =>
    p.zh === t || p.en.toLowerCase() === tLower
  );
  if (exact.length) return exact;

  // 英文部分比對（包含）
  const enPartial = RECIPIENTS.filter(p =>
    p.en.toLowerCase().includes(tLower) || tLower.includes(p.en.toLowerCase())
  );
  if (enPartial.length) return enPartial;

  // 中文姓氏比對（取第一個字）
  const surname = t.charAt(0);
  const surnameMatch = RECIPIENTS.filter(p => p.zh.charAt(0) === surname);
  if (surnameMatch.length) return surnameMatch;

  // 中文部分包含比對
  const zhPartial = RECIPIENTS.filter(p => p.zh.includes(t) || t.includes(p.zh));
  if (zhPartial.length) return zhPartial;

  return [];
}

function applyRecipient(person) {
  document.getElementById('recipient').value = formatPerson(person);
  document.getElementById('recipientPicker').style.display = 'none';
}

window.selectRecipient = applyRecipient;

function handleRecipientOCR(ocrText) {
  const candidates = matchRecipient(ocrText);
  if (candidates.length === 1) {
    applyRecipient(candidates[0]);
  } else if (candidates.length > 1) {
    document.getElementById('recipient').value = ocrText;
    const chips = document.getElementById('recipientChips');
    chips.innerHTML = '';
    candidates.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'recipient-chip';
      btn.textContent = formatPerson(p);
      btn.addEventListener('click', () => applyRecipient(p));
      chips.appendChild(btn);
    });
    document.getElementById('recipientPicker').style.display = 'block';
  } else {
    document.getElementById('recipient').value = ocrText;
  }
}

// 手動改收件人時隱藏選單
document.getElementById('recipient').addEventListener('input', () => {
  document.getElementById('recipientPicker').style.display = 'none';
});

document.getElementById('date').value = new Date().toISOString().split('T')[0];

// ── State ──────────────────────────────────────────
let images = { front: null, back: null };

// ── Photo inputs ───────────────────────────────────
function setupInput(inputId, side) {
  document.getElementById(inputId).addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    images[side] = await compress(file);
    const preview = document.getElementById(side === 'front' ? 'frontPreview' : 'backPreview');
    const placeholder = document.getElementById(side === 'front' ? 'frontPlaceholder' : 'backPlaceholder');
    preview.src = 'data:image/jpeg;base64,' + images[side];
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    updateOcrBtn();
  });
}
setupInput('frontCamera', 'front');
setupInput('frontGallery', 'front');
setupInput('backCamera', 'back');
setupInput('backGallery', 'back');

function updateOcrBtn() {
  document.getElementById('ocrBtn').disabled = !(images.front || images.back);
}

// ── Sender lookup / upsert ────────────────────────
async function lookupSender(name) {
  if (!name) return;
  try {
    const q = query(collection(db, 'senders'), where('name', '==', name), limit(1));
    const snap = await getDocs(q);
    if (!snap.empty) {
      const s = snap.docs[0].data();
      if (s.address) document.getElementById('senderAddress').value = s.address;
      if (s.phone)   document.getElementById('senderPhone').value   = s.phone;
      document.getElementById('senderLookupStatus').textContent = '✅ 已從通訊錄帶入';
    } else {
      document.getElementById('senderLookupStatus').textContent = '🆕 新寄件人，儲存後自動記錄';
    }
  } catch(e) { /* 查不到不影響流程 */ }
}

async function upsertSender(name, address, phone) {
  if (!name) return;
  try {
    const q = query(collection(db, 'senders'), where('name', '==', name), limit(1));
    const snap = await getDocs(q);
    const data = { name, address: address||'', phone: phone||'', updatedAt: serverTimestamp() };
    if (!snap.empty) {
      await setDoc(snap.docs[0].ref, data, { merge: true });
    } else {
      await addDoc(collection(db, 'senders'), data);
    }
  } catch(e) { /* upsert 失敗不阻擋主流程 */ }
}

// ── OCR ────────────────────────────────────────────
const FRONT_PROMPT = '這是一封掛號信封的正面。請辨識以下欄位，以純 JSON 回傳（不加 markdown）：{"trackingNumber":"掛號號碼，有兩種格式：①國際掛號=2英文+9數字+2英文共13碼（如RA123456789TW）②普通掛號條碼=純數字20碼（如91889822000210104007）。辨識完整不可遺漏，去除空格後回傳","recipient":"收件人姓名或單位","sender":"寄件人姓名或單位","senderAddress":"寄件人地址（完整含縣市，找不到填空）","senderPhone":"寄件人電話（找不到填空）"}。找不到的填空字串。';
const BACK_PROMPT  = '這是一封掛號信封的背面。請辨識以下欄位，以純 JSON 回傳（不加 markdown）：{"trackingNumber":"掛號號碼，有兩種格式：①國際掛號=2英文+9數字+2英文共13碼（如RA123456789TW）②普通掛號條碼=純數字20碼（如91889822000210104007）。若有條碼請辨識條碼，辨識完整不可遺漏，去除空格後回傳","recipient":"收件人姓名或單位（若有）","sender":"寄件人姓名或單位（若有）","senderAddress":"寄件人地址（完整含縣市，找不到填空）","senderPhone":"寄件人電話（找不到填空）"}。找不到的填空字串。';

window.runOCR = async function() {
  const btn = document.getElementById('ocrBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 辨識中…';
  showStatus('正面與反面同時辨識中…');

  try {
    // 正面與反面並行辨識
    const [frontResult, backResult] = await Promise.all([
      images.front
        ? ocrEnvelope({ imageBase64: images.front, mimeType: 'image/jpeg', prompt: FRONT_PROMPT }).then(r => r.data || {}).catch(() => ({}))
        : Promise.resolve({}),
      images.back
        ? ocrEnvelope({ imageBase64: images.back, mimeType: 'image/jpeg', prompt: BACK_PROMPT }).then(r => r.data || {}).catch(() => ({}))
        : Promise.resolve({})
    ]);

    // 合併：正面優先，反面補缺
    const merged = {
      trackingNumber: pickBetter(frontResult.trackingNumber, backResult.trackingNumber),
      recipient:      pickBetter(frontResult.recipient,      backResult.recipient),
      sender:         pickBetter(frontResult.sender,         backResult.sender),
      senderAddress:  pickBetter(frontResult.senderAddress,  backResult.senderAddress),
      senderPhone:    pickBetter(frontResult.senderPhone,    backResult.senderPhone),
    };

    if (merged.trackingNumber) document.getElementById('trackingNumber').value = formatTracking(merged.trackingNumber);
    if (merged.recipient) handleRecipientOCR(merged.recipient);
    if (merged.sender) {
      document.getElementById('sender').value = merged.sender;
      document.getElementById('senderAddress').value = merged.senderAddress || '';
      document.getElementById('senderPhone').value   = merged.senderPhone   || '';
      await lookupSender(merged.sender);
    }

    const sides = [images.front && '正面', images.back && '反面'].filter(Boolean).join('＋');
    showStatus(`✅ ${sides}辨識完成，請確認欄位`, 'success');
  } catch(e) {
    showStatus('❌ ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ 自動辨識';
    updateOcrBtn();
  }
};

// 選較完整的值（優先有值的，次選較長的）
function pickBetter(a, b) {
  a = (a || '').trim(); b = (b || '').trim();
  if (!a) return b;
  if (!b) return a;
  return a.length >= b.length ? a : b;
}

function formatTracking(num) {
  if (!num) return '';
  const n = num.replace(/\s+/g, '').toUpperCase();
  // 國際掛號：AA 000 000 000 TW（13碼）
  const m13 = n.match(/^([A-Z]{2})(\d{3})(\d{3})(\d{3})([A-Z]{2})$/);
  if (m13) return `${m13[1]} ${m13[2]} ${m13[3]} ${m13[4]} ${m13[5]}`;
  // 普通掛號條碼：000000 000000 00 00000 0（20碼純數字）
  const m20 = n.match(/^(\d{6})(\d{6})(\d{2})(\d{5})(\d{1})$/);
  if (m20) return `${m20[1]} ${m20[2]} ${m20[3]} ${m20[4]} ${m20[5]}`;
  return num;
}

// ── Save ───────────────────────────────────────────
async function saveData() {
  const trackingNumber = document.getElementById('trackingNumber').value.trim();
  const recipient      = document.getElementById('recipient').value.trim();
  const sender         = document.getElementById('sender').value.trim();
  const senderAddress  = document.getElementById('senderAddress').value.trim();
  const senderPhone    = document.getElementById('senderPhone').value.trim();
  await addDoc(collection(db, 'mail_receipts'), {
    trackingNumber,
    recipient,
    sender,
    senderAddress,
    senderPhone,
    date: document.getElementById('date').value,
    notes: document.getElementById('notes').value.trim(),
    status: 'pending',
    createdAt: serverTimestamp(),
    receivedAt: null,
    signatureImage: null,
    envelopeImage: images.front ? 'data:image/jpeg;base64,' + images.front : null,
    envelopeBackImage: images.back ? 'data:image/jpeg;base64,' + images.back : null
  });
  await upsertSender(sender, senderAddress, senderPhone);
  return true;
}

window.saveRecord = async function() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    if (await saveData()) location.href = 'index.html';
  } catch(e) { alert('儲存失敗：' + e.message); }
  btn.disabled = false; btn.textContent = '儲存完成';
};

window.saveAndContinue = async function() {
  const btn = document.getElementById('continueBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    if (!await saveData()) { btn.disabled = false; btn.textContent = '儲存並繼續'; return; }
    // 清空
    images = { front: null, back: null };
    ['frontPreview','backPreview'].forEach(id => document.getElementById(id).style.display = 'none');
    ['frontPlaceholder','backPlaceholder'].forEach(id => document.getElementById(id).style.display = 'block');
    ['frontCamera','frontGallery','backCamera','backGallery'].forEach(id => document.getElementById(id).value = '');
    ['trackingNumber','recipient','sender','senderAddress','senderPhone','notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('senderLookupStatus').textContent = '';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('ocrBtn').disabled = true;
    showStatus('✅ 已儲存，可繼續登記下一封', 'success');
  } catch(e) { alert('儲存失敗：' + e.message); }
  btn.disabled = false; btn.textContent = '儲存並繼續';
};

// ── Utils ──────────────────────────────────────────
function showStatus(msg, type = '') {
  const el = document.getElementById('ocrStatus');
  el.textContent = msg;
  el.className = 'ocr-status' + (type ? ' ' + type : '');
}

function compress(file) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1200; let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', 0.8).split(',')[1]);
    };
    img.src = url;
  });
}
</script>
</body>
</html>

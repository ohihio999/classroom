<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>領取簽收</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

    .header {
      background: #1976D2; color: white; padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .back-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
    .header h1 { font-size: 18px; font-weight: 600; }

    .content { padding: 20px 16px; max-width: 600px; margin: 0 auto; }

    .info-card {
      background: white; border-radius: 12px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .info-card h2 { font-size: 15px; color: #555; margin-bottom: 14px; font-weight: 500; }

    .info-row { display: flex; margin-bottom: 10px; font-size: 15px; }
    .info-label { color: #888; width: 80px; flex-shrink: 0; }
    .info-value { color: #222; font-weight: 500; flex: 1; }

    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-top: 8px; }
    .badge-pending { background: #FFF3E0; color: #E65100; }
    .badge-received { background: #E8F5E9; color: #2E7D32; }

    .signature-card {
      background: white; border-radius: 12px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .signature-card h2 { font-size: 15px; color: #555; margin-bottom: 6px; font-weight: 500; }
    .signature-hint { font-size: 13px; color: #aaa; margin-bottom: 12px; }

    #signCanvas {
      width: 100%; border: 2px solid #e0e0e0; border-radius: 10px;
      display: block; background: #fafafa; cursor: crosshair; touch-action: none;
    }

    .canvas-actions { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end; }
    .btn-clear { background: #eee; color: #555; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }

    .btn-confirm {
      width: 100%; padding: 16px; background: #1976D2; color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .btn-confirm:disabled { background: #aaa; cursor: not-allowed; }

    .received-info {
      background: #E8F5E9; border-radius: 10px; padding: 16px;
      margin-bottom: 16px; text-align: center;
    }
    .received-info .icon { font-size: 40px; margin-bottom: 8px; }
    .received-info p { color: #2E7D32; font-weight: 600; margin-bottom: 4px; }
    .received-info .time { font-size: 13px; color: #555; }

    .sig-preview { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #eee; }

    .envelope-img { width: 100%; border-radius: 8px; margin-top: 10px; }

    .loading { text-align: center; padding: 60px 20px; color: #aaa; }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <h1>領取簽收</h1>
</div>

<div class="content" id="content">
  <div class="loading">載入中…</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBf0sHTsndFCksNlh46G_2mw9rk5zmPdc0",
  authDomain: "my-teaching-tools-2b36c.firebaseapp.com",
  projectId: "my-teaching-tools-2b36c",
  storageBucket: "my-teaching-tools-2b36c.firebasestorage.app",
  messagingSenderId: "82693897353",
  appId: "1:82693897353:web:f667501aad05c536c09a58"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const docId = params.get('id');
if (!docId) { location.href = 'index.html'; }

onAuthStateChanged(auth, (user) => {
  if (!user) location.href = `/login.html?redirect=${encodeURIComponent(location.href)}`;
});

let record = null;
let canvas, ctx, drawing = false, hasStrokes = false;

async function load() {
  try {
    const snap = await getDoc(doc(db, 'mail_receipts', docId));
    if (!snap.exists()) { alert('找不到此紀錄'); location.href = 'index.html'; return; }
    record = { id: snap.id, ...snap.data() };
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading">載入失敗：${e.message}</div>`;
  }
}

function render() {
  const content = document.getElementById('content');

  // 信件資訊
  let infoHtml = `
    <div class="info-card">
      <h2>信件資訊</h2>
      <div class="info-row"><span class="info-label">掛號號碼</span><span class="info-value">${record.trackingNumber || '—'}</span></div>
      <div class="info-row"><span class="info-label">收件人</span><span class="info-value">${record.recipient || '—'}</span></div>
      <div class="info-row"><span class="info-label">寄件人</span><span class="info-value">${record.sender || '—'}</span></div>
      <div class="info-row"><span class="info-label">日期</span><span class="info-value">${record.date || '—'}</span></div>
      ${record.notes ? `<div class="info-row"><span class="info-label">備註</span><span class="info-value">${record.notes}</span></div>` : ''}
      <span class="badge ${record.status === 'received' ? 'badge-received' : 'badge-pending'}">
        ${record.status === 'received' ? '已領取' : '未領取'}
      </span>
      ${record.envelopeImage ? `<img class="envelope-img" src="${record.envelopeImage}" alt="信封照片">` : ''}
    </div>
  `;

  if (record.status === 'received') {
    // 已領取：顯示簽名紀錄
    const time = record.receivedAt ? new Date(record.receivedAt.seconds * 1000).toLocaleString('zh-TW') : '';
    content.innerHTML = infoHtml + `
      <div class="received-info">
        <div class="icon">✅</div>
        <p>已完成簽收</p>
        <div class="time">${time}</div>
      </div>
      ${record.signatureImage ? `
        <div class="info-card">
          <h2>簽名紀錄</h2>
          <img class="sig-preview" src="${record.signatureImage}" alt="簽名">
        </div>
      ` : ''}
    `;
  } else {
    // 未領取：顯示簽名畫板
    content.innerHTML = infoHtml + `
      <div class="signature-card">
        <h2>請在下方簽名</h2>
        <p class="signature-hint">用手指或觸控筆簽名</p>
        <canvas id="signCanvas" height="200"></canvas>
        <div class="canvas-actions">
          <button class="btn-clear" onclick="clearCanvas()">清除</button>
        </div>
      </div>
      <button class="btn-confirm" id="confirmBtn" onclick="confirmReceipt()">確認簽收</button>
    `;

    initCanvas();
  }
}

function initCanvas() {
  canvas = document.getElementById('signCanvas');
  canvas.width = canvas.offsetWidth;
  ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Touch
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    drawing = true;
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    ctx.beginPath();
    ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!drawing) return;
    const t = e.touches[0];
    const r = canvas.getBoundingClientRect();
    ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
    ctx.stroke();
    hasStrokes = true;
  }, { passive: false });

  canvas.addEventListener('touchend', () => { drawing = false; });

  // Mouse
  canvas.addEventListener('mousedown', e => {
    drawing = true;
    const r = canvas.getBoundingClientRect();
    ctx.beginPath();
    ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
  });
  canvas.addEventListener('mousemove', e => {
    if (!drawing) return;
    const r = canvas.getBoundingClientRect();
    ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
    ctx.stroke();
    hasStrokes = true;
  });
  canvas.addEventListener('mouseup', () => { drawing = false; });
  canvas.addEventListener('mouseleave', () => { drawing = false; });
}

window.clearCanvas = function() {
  if (canvas && ctx) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasStrokes = false;
  }
};

window.confirmReceipt = async function() {
  if (!hasStrokes) {
    alert('請先完成簽名');
    return;
  }

  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = '處理中…';

  try {
    const signatureImage = canvas.toDataURL('image/png');
    await updateDoc(doc(db, 'mail_receipts', docId), {
      status: 'received',
      receivedAt: serverTimestamp(),
      signatureImage
    });
    location.href = 'index.html';
  } catch(e) {
    alert('簽收失敗：' + e.message);
    btn.disabled = false;
    btn.textContent = '確認簽收';
  }
};

load();
</script>
</body>
</html>

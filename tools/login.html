<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1976D2; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 48px 36px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #222; margin-bottom: 6px; }
    p { font-size: 14px; color: #888; margin-bottom: 36px; }
    .btn-google { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #e0e0e0; background: white; font-size: 15px; font-weight: 500; color: #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .google-icon { width: 20px; height: 20px; }
    .error { color: #d32f2f; font-size: 13px; margin-top: 14px; min-height: 18px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🏢</div>
  <h1>維運工具</h1>
  <p>請用公司 Google 帳號登入</p>
  <button class="btn-google" id="loginBtn" onclick="loginWithGoogle()">
    <svg class="google-icon" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    用 Google 帳號登入
  </button>
  <div class="error" id="errorMsg"></div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
const firebaseConfig = { apiKey:"AIzaSyBf0sHTsndFCksNlh46G_2mw9rk5zmPdc0", authDomain:"my-teaching-tools-2b36c.firebaseapp.com", projectId:"my-teaching-tools-2b36c", storageBucket:"my-teaching-tools-2b36c.firebasestorage.app", messagingSenderId:"82693897353", appId:"1:82693897353:web:f667501aad05c536c09a58" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const redirectTo = new URLSearchParams(location.search).get('redirect') || '/';
onAuthStateChanged(auth, (user) => { if (user) location.href = redirectTo; });
window.loginWithGoogle = async function() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('errorMsg').textContent = '';
  try { await signInWithPopup(auth, provider); location.href = redirectTo; }
  catch(e) { document.getElementById('errorMsg').textContent = '登入失敗：' + e.message; btn.disabled = false; }
};
</script>
</body>
</html>

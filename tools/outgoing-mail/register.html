<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登記寄件</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .header { background: #5C6BC0; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .back-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .content { padding: 16px; max-width: 600px; margin: 0 auto; }
    .section { background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .section-title { font-size: 14px; color: #555; margin-bottom: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .photo-preview { width: 100%; max-height: 160px; object-fit: contain; border-radius: 8px; display: none; margin-bottom: 8px; border: 1px solid #eee; }
    .photo-placeholder { border: 2px dashed #ddd; border-radius: 10px; padding: 24px; text-align: center; margin-bottom: 8px; }
    .photo-placeholder .ph-icon { font-size: 32px; }
    .photo-placeholder .ph-label { font-size: 12px; color: #aaa; margin-top: 4px; }
    .photo-btns { display: flex; gap: 8px; }
    input[type="file"] { display: none; }
    .envelope-slot { border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .envelope-slot-header { font-size: 13px; color: #666; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .remove-btn { background: none; border: none; color: #d32f2f; font-size: 20px; cursor: pointer; line-height: 1; }
    .add-envelope-btn { width: 100%; padding: 14px; border: 2px dashed #5C6BC0; background: none; border-radius: 10px; color: #5C6BC0; font-size: 14px; cursor: pointer; font-weight: 600; margin-top: 4px; }
    .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
    .btn-camera { background: #5C6BC0; color: white; }
    .btn-gallery { background: #fff; color: #5C6BC0; border: 1px solid #5C6BC0; }
    .btn-ocr-all { background: #388E3C; color: white; width: 100%; justify-content: center; padding: 14px; font-size: 15px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-ocr-all:disabled { background: #bbb; cursor: not-allowed; }
    .btn-save-all { background: #5C6BC0; color: white; width: 100%; justify-content: center; padding: 16px; font-size: 15px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-save-all:disabled { background: #aaa; cursor: not-allowed; }
    .ocr-status { font-size: 13px; color: #aaa; margin-top: 10px; min-height: 18px; text-align: center; }
    .ocr-status.success { color: #388E3C; }
    .ocr-status.error { color: #d32f2f; }
    .record-card { border: 1px solid #c8e6c9; border-radius: 10px; padding: 14px; margin-bottom: 12px; background: #f9fbe7; }
    .record-card-title { font-size: 13px; font-weight: 700; color: #2e7d32; margin-bottom: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: white; }
    .form-group input:focus, .form-group select:focus { border-color: #5C6BC0; }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #resultsSection { display: none; }
    .results-heading { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h1>登記寄件</h1>
  <button class="back-btn" onclick="location.href='/'" style="margin-left:auto">🏠</button>
</div>

<div class="content">

  <!-- 收執聯 -->
  <div class="section">
    <div class="section-title">🧾 收執聯（一張對應全部）</div>
    <img id="receiptPreview" class="photo-preview" alt="">
    <div id="receiptPlaceholder" class="photo-placeholder">
      <div class="ph-icon">🧾</div>
      <div class="ph-label">郵局收執聯</div>
    </div>
    <div class="photo-btns">
      <label class="btn btn-camera" for="receiptCamera">📷 拍照</label>
      <label class="btn btn-gallery" for="receiptGallery">🖼️ 相簿</label>
    </div>
    <input type="file" id="receiptCamera" accept="image/*" capture="environment">
    <input type="file" id="receiptGallery" accept="image/*">
  </div>

  <!-- 信封 -->
  <div class="section">
    <div class="section-title">✉️ 信封照片（每封一張）</div>
    <div id="envelopeSlots"></div>
    <button class="add-envelope-btn" onclick="addEnvelopeSlot()">＋ 新增信封</button>
  </div>

  <!-- 一次辨識 -->
  <button class="btn-ocr-all" id="ocrAllBtn" onclick="runBatchOCR()" disabled>✨ 一次辨識全部</button>
  <div class="ocr-status" id="ocrStatus"></div>

  <!-- 辨識結果 -->
  <div id="resultsSection">
    <div style="height:16px"></div>
    <div class="results-heading">📋 辨識結果（可編輯）</div>
    <div id="recordsList"></div>
    <button class="btn-save-all" id="saveAllBtn" onclick="saveAll()">💾 儲存全部</button>
  </div>

  <div style="height:32px"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';
import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-functions.js';

const firebaseConfig = { apiKey:"AIzaSyBf0sHTsndFCksNlh46G_2mw9rk5zmPdc0", authDomain:"my-teaching-tools-2b36c.firebaseapp.com", projectId:"my-teaching-tools-2b36c", storageBucket:"my-teaching-tools-2b36c.firebasestorage.app", messagingSenderId:"82693897353", appId:"1:82693897353:web:f667501aad05c536c09a58" };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const functions = getFunctions(app, 'asia-east1');
const ocrFn = httpsCallable(functions, 'ocrEnvelope');

// ── State ──────────────────────────────────────────
let receiptBase64 = null;
let envelopeSlots = [];
let slotCounter = 0;
let records = [];

// ── Receipt inputs ─────────────────────────────────
['receiptCamera','receiptGallery'].forEach(id => {
  document.getElementById(id).addEventListener('change', async e => {
    const file = e.target.files[0]; if (!file) return;
    receiptBase64 = await compress(file);
    const preview = document.getElementById('receiptPreview');
    preview.src = 'data:image/jpeg;base64,' + receiptBase64;
    preview.style.display = 'block';
    document.getElementById('receiptPlaceholder').style.display = 'none';
  });
});

// ── Envelope slots ─────────────────────────────────
window.addEnvelopeSlot = function() {
  const id = ++slotCounter;
  envelopeSlots.push({ id, base64: null });
  renderSlots();
};

window.removeEnvelopeSlot = function(id) {
  envelopeSlots = envelopeSlots.filter(s => s.id !== id);
  renderSlots();
  updateOcrBtn();
};

function renderSlots() {
  const container = document.getElementById('envelopeSlots');
  container.innerHTML = '';
  envelopeSlots.forEach((slot, idx) => {
    const div = document.createElement('div');
    div.className = 'envelope-slot';
    div.innerHTML = `
      <div class="envelope-slot-header">
        <span>信封 ${idx + 1}</span>
        ${envelopeSlots.length > 1
          ? `<button class="remove-btn" onclick="removeEnvelopeSlot(${slot.id})">✕</button>`
          : ''}
      </div>
      ${slot.base64
        ? `<img src="data:image/jpeg;base64,${slot.base64}" class="photo-preview" style="display:block" alt="">`
        : `<div class="photo-placeholder"><div class="ph-icon">✉️</div><div class="ph-label">信封正面</div></div>`
      }
      <div class="photo-btns">
        <label class="btn btn-camera" for="envCam_${slot.id}">📷 拍照</label>
        <label class="btn btn-gallery" for="envGal_${slot.id}">🖼️ 相簿</label>
      </div>
      <input type="file" id="envCam_${slot.id}" accept="image/*" capture="environment">
      <input type="file" id="envGal_${slot.id}" accept="image/*">
    `;
    container.appendChild(div);
    [`envCam_${slot.id}`, `envGal_${slot.id}`].forEach(inputId => {
      document.getElementById(inputId).addEventListener('change', async e => {
        const file = e.target.files[0]; if (!file) return;
        const b64 = await compress(file);
        const s = envelopeSlots.find(s => s.id === slot.id);
        if (s) { s.base64 = b64; renderSlots(); updateOcrBtn(); }
      });
    });
  });
}

function updateOcrBtn() {
  document.getElementById('ocrAllBtn').disabled = !envelopeSlots.some(s => s.base64);
}

// init
addEnvelopeSlot();

// ── Batch OCR ──────────────────────────────────────
const ENVELOPE_PROMPT = '這是一封信封的正面。請辨識以下欄位，以純 JSON 回傳（不加 markdown）：{"senderName":"寄件人公司或姓名","recipientName":"收件人公司或單位","recipientDept":"部門（若無填空）","recipientContact":"聯絡人姓名（若無填空）","recipientAddress":"完整收件地址（含縣市）","content":"信件內容說明（若有標示，否則填空）"}。找不到的欄位填空字串。';
const RECEIPT_PROMPT = '這是一張郵局掛號收執聯，可能有多筆掛號。台灣掛號號碼格式：2個英文字母＋9位數字＋2個英文字母，共13碼，請仔細辨識每一碼，不可遺漏任何一個字元。以純 JSON 回傳（不加 markdown）：{"items":[{"trackingNumber":"完整13碼掛號號碼","destination":"目的地城市（如高雄市、台北市、台中市，從郵遞區號或地址判斷）"}],"date":"日期 YYYY-MM-DD（民國年轉西元）","postage":"郵費數字（找不到填空）"}。依序列出所有掛號，找不到的填空字串。';

window.runBatchOCR = async function() {
  const btn = document.getElementById('ocrAllBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 辨識中…';
  showStatus('辨識中，請稍候…');

  try {
    const today = new Date().toISOString().split('T')[0];

    // 所有信封並行辨識
    const envelopePromises = envelopeSlots
      .filter(s => s.base64)
      .map(s => ocrFn({ imageBase64: s.base64, mimeType: 'image/jpeg', prompt: ENVELOPE_PROMPT })
        .then(r => r.data || {})
        .catch(() => ({})));

    // 收執聯辨識
    let receiptData = { items: [], date: today, postage: '' };
    if (receiptBase64) {
      try {
        const r = await ocrFn({ imageBase64: receiptBase64, mimeType: 'image/jpeg', prompt: RECEIPT_PROMPT });
        const d = r.data || {};
        receiptData = {
          items: Array.isArray(d.items) ? d.items : [],
          date: d.date || today,
          postage: d.postage || ''
        };
      } catch(e) {}
    }

    const envResults = await Promise.all(envelopePromises);

    // 合併：依地址智慧配對掛號號碼，配不到再依序補
    const items = [...receiptData.items];
    const assigned = new Array(envResults.length).fill(null);
    const usedIdx = new Set();

    // 第一輪：地址包含目的地城市的直接配對
    envResults.forEach((env, i) => {
      const addr = (env.recipientAddress || '').toLowerCase();
      for (let j = 0; j < items.length; j++) {
        if (usedIdx.has(j)) continue;
        const dest = (items[j].destination || '').toLowerCase();
        if (dest && addr.includes(dest)) {
          assigned[i] = items[j].trackingNumber || '';
          usedIdx.add(j);
          break;
        }
      }
    });

    // 第二輪：未配對的依序填剩餘號碼
    let nextJ = 0;
    envResults.forEach((_, i) => {
      if (assigned[i] !== null) return;
      while (nextJ < items.length && usedIdx.has(nextJ)) nextJ++;
      assigned[i] = nextJ < items.length ? (items[nextJ].trackingNumber || '') : '';
      usedIdx.add(nextJ); nextJ++;
    });

    records = envResults.map((env, i) => ({
      trackingNumber: assigned[i] || '',
      senderName: env.senderName || '',
      recipientName: env.recipientName || '',
      recipientDept: env.recipientDept || '',
      recipientContact: env.recipientContact || '',
      recipientAddress: env.recipientAddress || '',
      content: env.content || '',
      type: '信函',
      date: receiptData.date,
      postage: receiptData.postage,
      notes: '',
      status: 'sent'
    }));

    renderRecords();
    document.getElementById('resultsSection').style.display = 'block';
    showStatus(`✅ 辨識完成，共 ${records.length} 筆，請確認後儲存`, 'success');
    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    showStatus('❌ ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ 一次辨識全部';
    updateOcrBtn();
  }
};

// ── Render editable records ────────────────────────
function renderRecords() {
  const container = document.getElementById('recordsList');
  container.innerHTML = '';
  records.forEach((rec, i) => {
    const div = document.createElement('div');
    div.className = 'record-card';
    div.innerHTML = `
      <div class="record-card-title">第 ${i + 1} 封</div>
      <div class="form-group"><label>掛號號碼</label><input id="r${i}_trackingNumber" value="${esc(formatTracking(rec.trackingNumber))}" style="font-family:'Courier New',monospace;letter-spacing:1px"></div>
      <div class="form-group"><label>收件公司/單位</label><input id="r${i}_recipientName" value="${esc(rec.recipientName)}"></div>
      <div class="form-row">
        <div class="form-group"><label>部門</label><input id="r${i}_recipientDept" value="${esc(rec.recipientDept)}"></div>
        <div class="form-group"><label>聯絡人</label><input id="r${i}_recipientContact" value="${esc(rec.recipientContact)}"></div>
      </div>
      <div class="form-group"><label>收件地址</label><input id="r${i}_recipientAddress" value="${esc(rec.recipientAddress)}"></div>
      <div class="form-group"><label>寄件人</label><input id="r${i}_senderName" value="${esc(rec.senderName)}"></div>
      <div class="form-group"><label>內容/用途</label><input id="r${i}_content" value="${esc(rec.content)}"></div>
      <div class="form-row">
        <div class="form-group"><label>類別</label>
          <select id="r${i}_type">
            <option value="信函" ${rec.type==='信函'?'selected':''}>信函</option>
            <option value="包裹" ${rec.type==='包裹'?'selected':''}>包裹</option>
            <option value="其他" ${rec.type==='其他'?'selected':''}>其他</option>
          </select>
        </div>
        <div class="form-group"><label>郵費（元）</label><input id="r${i}_postage" value="${esc(rec.postage)}"></div>
      </div>
      <div class="form-group"><label>寄出日期</label><input type="date" id="r${i}_date" value="${esc(rec.date)}"></div>
      <div class="form-group"><label>備註</label><input id="r${i}_notes" value="${esc(rec.notes)}"></div>
    `;
    container.appendChild(div);
  });
}

// ── Save all ───────────────────────────────────────
window.saveAll = async function() {
  const btn = document.getElementById('saveAllBtn');
  btn.disabled = true; btn.textContent = '儲存中…';
  const fields = ['trackingNumber','recipientName','recipientDept','recipientContact','recipientAddress','senderName','content','type','postage','date','notes'];
  try {
    const writes = records.map((_, i) => {
      const data = { status: 'sent', createdAt: serverTimestamp() };
      fields.forEach(f => { data[f] = (document.getElementById(`r${i}_${f}`)?.value || '').trim(); });
      if (receiptBase64) data.receiptImage = 'data:image/jpeg;base64,' + receiptBase64;
      return addDoc(collection(db, 'outgoing_mail'), data);
    });
    await Promise.all(writes);
    location.href = 'index.html';
  } catch(e) {
    alert('儲存失敗：' + e.message);
    btn.disabled = false; btn.innerHTML = '💾 儲存全部';
  }
};

// ── Utils ──────────────────────────────────────────
function showStatus(msg, type = '') {
  const el = document.getElementById('ocrStatus');
  el.textContent = msg;
  el.className = 'ocr-status' + (type ? ' ' + type : '');
}

function esc(str) {
  return (str || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function formatTracking(num) {
  if (!num) return '';
  const n = num.replace(/\s+/g, '').toUpperCase();
  // 國際掛號：AA 000 000 000 TW（13碼）
  const m13 = n.match(/^([A-Z]{2})(\d{3})(\d{3})(\d{3})([A-Z]{2})$/);
  if (m13) return `${m13[1]} ${m13[2]} ${m13[3]} ${m13[4]} ${m13[5]}`;
  // 普通掛號條碼：000000 000000 00 00000 0（20碼純數字）
  const m20 = n.match(/^(\d{6})(\d{6})(\d{2})(\d{5})(\d{1})$/);
  if (m20) return `${m20[1]} ${m20[2]} ${m20[3]} ${m20[4]} ${m20[5]}`;
  return num;
}

function compress(file) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1200; let w = img.width, h = img.height;
      if (w > MAX) { h = h * MAX / w; w = MAX; }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', 0.8).split(',')[1]);
    };
    img.src = url;
  });
}
</script>
</body>
</html>

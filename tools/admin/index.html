<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陳佳興專用</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .header { background: #1976D2; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: relative; }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .logout { position: absolute; right: 16px; top: 22px; background: none; border: none; color: white; font-size: 13px; cursor: pointer; opacity: 0.8; }
    .tools { padding: 24px 16px; display: flex; flex-direction: column; gap: 14px; max-width: 480px; margin: 0 auto; }
    .tool-card { background: white; border-radius: 14px; padding: 24px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; display: flex; align-items: center; gap: 16px; transition: transform 0.1s, box-shadow 0.1s; text-decoration: none; color: inherit; }
    .tool-card:active { transform: scale(0.98); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .tool-icon { font-size: 40px; flex-shrink: 0; }
    .tool-name { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 4px; }
    .tool-desc { font-size: 13px; color: #888; }
  </style>
</head>
<body>
<div class="header">
  <h1>陳佳興專用</h1>
  <button class="logout" onclick="logout()">登出</button>
</div>
<div class="tools">
  <a class="tool-card" href="/tool-manager/">
    <div class="tool-icon">🗂️</div>
    <div>
      <div class="tool-name">小程式分類管理</div>
      <div class="tool-desc">收藏、分類、隨手可用的 AI 工具庫</div>
    </div>
  </a>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';

const firebaseConfig = { apiKey:"AIzaSyBf0sHTsndFCksNlh46G_2mw9rk5zmPdc0", authDomain:"my-teaching-tools-2b36c.firebaseapp.com", projectId:"my-teaching-tools-2b36c", storageBucket:"my-teaching-tools-2b36c.firebasestorage.app", messagingSenderId:"82693897353", appId:"1:82693897353:web:f667501aad05c536c09a58" };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const ALLOWED_EMAIL = 'ohihio@gmail.com';

onAuthStateChanged(auth, (user) => {
  if (!user) { location.href = '/login.html'; return; }
  if (user.email !== ALLOWED_EMAIL) {
    signOut(auth).then(() => { location.href = '/login.html'; });
    return;
  }
});

window.logout = async () => { await signOut(auth); location.href = '/login.html'; };
</script>
</body>
</html>

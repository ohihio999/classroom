<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIC 維運工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
    .header { background: #1976D2; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header h1 { font-size: 22px; font-weight: 600; }
    .tools { padding: 24px 16px; display: flex; flex-direction: column; gap: 14px; max-width: 480px; margin: 0 auto; }
    .tool-card { background: white; border-radius: 14px; padding: 24px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; display: flex; align-items: center; gap: 16px; transition: transform 0.1s, box-shadow 0.1s; text-decoration: none; color: inherit; }
    .tool-card:active { transform: scale(0.98); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .tool-icon { font-size: 40px; flex-shrink: 0; }
    .tool-name { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 4px; }
    .tool-desc { font-size: 13px; color: #888; }
  </style>
</head>
<body>
<div class="header">
  <h1>🏢 SIC 維運工具</h1>
</div>
<div class="tools">
  <a class="tool-card" href="/mail-receipt/">
    <div class="tool-icon">📬</div>
    <div>
      <div class="tool-name">掛號信簽收</div>
      <div class="tool-desc">登記收到的掛號信，收件人手寫簽收</div>
    </div>
  </a>
  <a class="tool-card" href="/outgoing-mail/">
    <div class="tool-icon">📤</div>
    <div>
      <div class="tool-name">寄件追蹤</div>
      <div class="tool-desc">登記寄出的信件與貨物，追蹤送達狀態</div>
    </div>
  </a>
  <a class="tool-card" href="https://menu-order-api.web.app/" target="_blank" rel="noopener noreferrer">
    <div class="tool-icon">🍱</div>
      <div>
      <div class="tool-name">訂餐系統</div>
      <div class="tool-desc">開啟便當、飲料、點心與訂購入口</div>
    </div>
  </a>
</div>
</body>
</html>

      const ts = TOOLS.filter(t => t.cat === cat.name);
      return `<div class="cat-block">
        <div class="cat-title">${cat.icon} ${cat.name}（${ts.length}）</div>

function logMsg(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

// ============ Run ============
window.runImport = async function () {
  if (!confirm(`此操作將清除所有現有資料，再匯入 ${CATEGORIES.length} 個分類、${TOOLS.length} 個工具。確定繼續？`)) return;

  const btn = document.getElementById('importBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>處理中...';
  status.innerHTML = '';
  document.getElementById('log').textContent = '';

  try {
    // 1. 取得所有現有資料
    logMsg('🗑️ 讀取現有資料...');
    const [toolSnap, catSnap] = await Promise.all([
      getDocs(collection(db, 'tool_manager_tools')),
      getDocs(collection(db, 'tool_manager_categories')),
    ]);
    logMsg(`   現有工具：${toolSnap.size} 個，分類：${catSnap.size} 個`);

    // 2. 清除現有資料（分批，每批 490 筆）
    logMsg('\n🗑️ 清除現有資料...');
    const allOld = [...toolSnap.docs, ...catSnap.docs];
    for (let i = 0; i < allOld.length; i += 490) {
      const b = writeBatch(db);
      allOld.slice(i, i + 490).forEach(d => b.delete(d.ref));
      await b.commit();
    }
    logMsg(`   ✓ 已清除 ${allOld.length} 筆`);

    // 3. 建立新分類（需要各自取得 ID，所以逐一 addDoc）
    logMsg('\n📁 建立新分類...');
    const catIdMap = {};
    for (let i = 0; i < CATEGORIES.length; i++) {
      const cat = CATEGORIES[i];
      const ref = await addDoc(collection(db, 'tool_manager_categories'), {
        name: cat.name,
        icon: cat.icon,
        color: COLORS[i % COLORS.length],
        createdAt: serverTimestamp(),
      });
      catIdMap[cat.name] = ref.id;
      logMsg(`   + ${cat.icon} ${cat.name}`);
      await new Promise(r => setTimeout(r, 60));
    }

    // 4. 批量匯入工具
    logMsg(`\n🛠️ 匯入工具（${TOOLS.length} 個）...`);
    const b = writeBatch(db);
    TOOLS.forEach(t => {
      const catId = catIdMap[t.cat];
      if (!catId) { logMsg(`   ⚠️ 找不到分類「${t.cat}」，跳過「${t.name}」`); return; }
      const ref = doc(collection(db, 'tool_manager_tools'));
      b.set(ref, { name: t.name, url: t.url, categoryId: catId, description: t.desc || '', createdAt: serverTimestamp() });
    });
    await b.commit();
    logMsg(`   ✓ 已匯入 ${TOOLS.length} 個工具`);

    // 5. 寫歷史紀錄
    await addDoc(collection(db, 'tool_manager_history'), {
      action: `重新整理資料庫：清除舊資料，匯入 ${CATEGORIES.length} 個分類、${TOOLS.length} 個工具`,
      createdAt: serverTimestamp(),
    });

    logMsg('\n✅ 完成！');
    status.innerHTML = `<div class="status ok">✅ 完成！<a href="/tool-manager/" style="margin-left:8px;color:#15803d">前往查看 →</a></div>`;
    btn.innerHTML = '✅ 已完成';
  } catch (e) {
    logMsg(`\n❌ 失敗：${e.message}`);
    status.innerHTML = `<div class="status err">❌ ${e.message}</div>`;
    btn.disabled = false;
    btn.innerHTML = '🚀 重試';
  }
};
</script>
</body>
</html>

// ============ Logic ============
let currentUser = null;

function logMsg(msg) {
  const log = document.getElementById('log');
  log.style.display = 'block';
  log.textContent += msg + '\n';
  log.scrollTop = log.scrollHeight;
}

function renderPreview() {
  const preview = document.getElementById('preview');
  preview.innerHTML = '<h3 style="font-size:15px;margin-bottom:10px">將匯入：</h3>' +
    CATEGORIES.map(cat => {
      const tools = TOOLS.filter(t => t.cat === cat.name);
      return `<div class="cat-block">
        <div class="cat-title">${cat.icon} ${cat.name}</div>
        <div class="cat-tools">${tools.length} 個工具：${tools.map(t => t.name).join('、')}</div>
      </div>`;
    }).join('') +
    `<div style="font-size:13px;color:#4a5568;margin-top:8px">總計：${CATEGORIES.length} 個分類、${TOOLS.length} 個工具</div>`;
}

onAuthStateChanged(auth, user => {
  if (!user) {
    document.getElementById('userInfo').innerHTML = '⚠️ 尚未登入，<a href="/login.html">前往登入</a>';
    return;
  }
  currentUser = user;
  document.getElementById('userInfo').textContent = `已登入：${user.email}`;
  document.getElementById('importBtn').disabled = false;
  renderPreview();
});

window.runImport = async function() {
  if (!confirm(`確定要匯入 ${CATEGORIES.length} 個分類、${TOOLS.length} 個工具？`)) return;

  const btn = document.getElementById('importBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>匯入中...';
  status.innerHTML = '';
  document.getElementById('log').textContent = '';

  try {
    // 1. Get existing categories
    logMsg('📋 讀取既有分類...');
    const catSnap = await getDocs(query(collection(db, 'tool_manager_categories'), orderBy('createdAt')));
    const existing = {};
    catSnap.docs.forEach(d => { existing[d.data().name] = d.id; });
    logMsg(`   既有分類：${Object.keys(existing).length} 個`);

    // 2. Create missing categories
    logMsg('\n📁 處理分類...');
    const catIdMap = { ...existing };
    let newCatCount = 0;
    for (let i = 0; i < CATEGORIES.length; i++) {
      const cat = CATEGORIES[i];
      if (catIdMap[cat.name]) {
        logMsg(`   ✓ 已存在「${cat.name}」`);
        continue;
      }
      const ref = await addDoc(collection(db, 'tool_manager_categories'), {
        name: cat.name,
        icon: cat.icon,
        color: COLORS[(Object.keys(catIdMap).length) % COLORS.length],
        createdAt: serverTimestamp()
      });
      catIdMap[cat.name] = ref.id;
      newCatCount++;
      logMsg(`   + 新增「${cat.icon} ${cat.name}」`);
      await new Promise(r => setTimeout(r, 80)); // throttle for createdAt ordering
    }

    // 3. Bulk write tools (in chunks of 400 for batch limits)
    logMsg(`\n🛠️ 匯入工具（${TOOLS.length} 個）...`);
    let imported = 0;
    const chunkSize = 400;
    for (let i = 0; i < TOOLS.length; i += chunkSize) {
      const chunk = TOOLS.slice(i, i + chunkSize);
      const batch = writeBatch(db);
      chunk.forEach(t => {
        const catId = catIdMap[t.cat];
        if (!catId) {
          logMsg(`   ⚠️ 找不到分類「${t.cat}」，跳過工具「${t.name}」`);
          return;
        }
        const ref = doc(collection(db, 'tool_manager_tools'));
        batch.set(ref, {
          name: t.name,
          url: t.url,
          categoryId: catId,
          description: t.desc || '',
          createdAt: serverTimestamp()
        });
      });
      await batch.commit();
      imported += chunk.length;
      logMsg(`   ✓ 已匯入 ${imported}/${TOOLS.length}`);
    }

    // 4. Log history
    await addDoc(collection(db, 'tool_manager_history'), {
      action: `批量匯入：新增 ${newCatCount} 個分類 + ${TOOLS.length} 個工具（來源：資料備份.md）`,
      createdAt: serverTimestamp()
    });

    logMsg(`\n✅ 完成！新增 ${newCatCount} 個分類、${imported} 個工具`);
    status.innerHTML = `<div class="status ok">✅ 匯入完成！<a href="/tool-manager/" style="margin-left:8px;color:#15803d">前往查看 →</a></div>`;
    btn.innerHTML = '✅ 已完成';
  } catch(e) {
    logMsg(`\n❌ 失敗：${e.message}`);
    status.innerHTML = `<div class="status err">❌ ${e.message}</div>`;
    btn.disabled = false;
    btn.innerHTML = '🚀 重試匯入';
  }
};
